<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F4EF;
    --ink: #1C1A17;
    --muted: #7A7672;
    --border: rgba(28,26,23,0.12);
    --accent: #8B6F47;
    --col-gap: clamp(6px, 1.2vw, 14px);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }

  header {
    padding: clamp(3rem, 8vw, 6rem) clamp(1.5rem, 6vw, 5rem) clamp(2rem, 5vw, 3.5rem);
    display: flex; flex-direction: column; gap: 0.5rem;
    border-bottom: 1px solid var(--border); position: relative;
  }
  header::after {
    content: ''; position: absolute; bottom: -1px; left: clamp(1.5rem, 6vw, 5rem);
    width: 60px; height: 2px; background: var(--accent);
  }
  .site-title { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: clamp(2.2rem, 6vw, 4rem); letter-spacing: -0.01em; line-height: 1.05; }
  .site-subtitle { font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }

  nav { padding: 1.4rem clamp(1.5rem, 6vw, 5rem); display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); }
  .filter-btn { border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Jost', sans-serif; font-size: 0.7rem; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.45rem 1rem; cursor: pointer; transition: all 0.2s; border-radius: 2px; }
  .filter-btn:hover { color: var(--ink); border-color: var(--ink); }
  .filter-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  main { padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 4vw, 3.5rem); columns: 3 220px; column-gap: var(--col-gap); }

  .card { break-inside: avoid; margin-bottom: var(--col-gap); cursor: pointer; position: relative; overflow: hidden; border-radius: 2px; background: #e8e4dc; }
  .card img { display: block; width: 100%; height: auto; transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .card:hover img { transform: scale(1.04); }
  .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(28,26,23,0.62) 0%, transparent 55%); opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; padding: 1.2rem; }
  .card:hover .card-overlay { opacity: 1; }
  .card-label { color: #F7F4EF; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 300; font-style: italic; line-height: 1.3; }
  .card-label small { display: block; font-family: 'Jost', sans-serif; font-style: normal; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.75; margin-top: 0.2rem; }

  #lightbox { display: none; position: fixed; inset: 0; background: rgba(28,26,23,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 2rem; }
  #lightbox.open { display: flex; }
  #lb-img-wrap { position: relative; max-width: min(90vw, 1100px); max-height: 85vh; display: flex; flex-direction: column; gap: 0.8rem; }
  #lb-img { max-width: 100%; max-height: 78vh; object-fit: contain; display: block; border-radius: 2px; }
  #lb-caption { color: rgba(247,244,239,0.7); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; text-align: center; }
  #lb-close { position: fixed; top: 1.5rem; right: 1.8rem; background: none; border: 1px solid rgba(247,244,239,0.25); color: rgba(247,244,239,0.7); font-size: 1.1rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 1001; }
  #lb-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .lb-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: 1px solid rgba(247,244,239,0.2); color: rgba(247,244,239,0.65); font-size: 1.2rem; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 1001; }
  .lb-arrow:hover { background: rgba(255,255,255,0.1); color: #fff; }
  #lb-prev { left: 1.5rem; } #lb-next { right: 1.5rem; }

  footer { padding: 2.5rem clamp(1.5rem, 6vw, 5rem); border-top: 1px solid var(--border); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: flex; gap: 2rem; flex-wrap: wrap; justify-content: space-between; }

  .hidden { display: none !important; }
  #error-msg { padding: 4rem clamp(1.5rem, 6vw, 5rem); color: var(--muted); font-size: 0.9rem; line-height: 1.8; }
  #error-msg code { font-family: monospace; background: rgba(0,0,0,0.06); padding: 0.1em 0.4em; border-radius: 3px; }

  .card.loading { min-height: 200px; }
  .card.loading::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, #e8e4dc 25%, #d9d4cb 50%, #e8e4dc 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @media (max-width: 500px) { main { columns: 2 140px; } .lb-arrow { display: none; } }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     ✏️  EDIT THESE TWO LINES TO CUSTOMISE
     ═══════════════════════════════════════════ -->
<script>
const SITE_TITLE    = "My Photography";
const SITE_SUBTITLE = "A personal collection";
const FOOTER_LEFT   = "© 2026";
const FOOTER_RIGHT  = "";
// Photos folder path — change only if your folder is named differently
const PHOTOS_DIR    = "photos/";
</script>
<!-- ════════════════════════════════════════════ -->

<header>
  <h1 class="site-title" id="site-title"></h1>
  <p class="site-subtitle" id="site-subtitle"></p>
</header>
<nav id="filters"></nav>
<main id="grid"></main>
<div id="error-msg" class="hidden"></div>
<footer>
  <span id="footer-left"></span>
  <span id="footer-right"></span>
</footer>

<div id="lightbox" role="dialog" aria-modal="true">
  <button id="lb-close">✕</button>
  <button class="lb-arrow" id="lb-prev">←</button>
  <div id="lb-img-wrap">
    <img id="lb-img" src="" alt="">
    <p id="lb-caption"></p>
  </div>
  <button class="lb-arrow" id="lb-next">→</button>
</div>

<script>
// ── Populate static text
document.getElementById('site-title').textContent    = SITE_TITLE;
document.getElementById('site-subtitle').textContent = SITE_SUBTITLE;
document.getElementById('footer-left').textContent   = FOOTER_LEFT;
document.getElementById('footer-right').textContent  = FOOTER_RIGHT;

// ── Parse "category-title-words.jpg" → { category, title }
function parseFilename(filename) {
  // Strip extension
  const base = filename.replace(/\.[^.]+$/, '');
  const parts = base.split('-');
  if (parts.length === 1) return { category: 'General', title: capitalise(parts[0]) };
  const category = capitalise(parts[0]);
  const title = parts.slice(1).map(capitalise).join(' ');
  return { category, title };
}

function capitalise(str) {
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

// ── Build gallery from photos array
function buildGallery(filenames) {
  const photos = filenames.map(f => ({ src: PHOTOS_DIR + f, ...parseFilename(f) }));

  // Filter buttons
  const categories = ['All', ...new Set(photos.map(p => p.category))];
  const nav = document.getElementById('filters');
  let activeFilter = 'All';

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
      filterCards();
    });
    nav.appendChild(btn);
  });

  function filterCards() {
    document.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('hidden', activeFilter !== 'All' && card.dataset.category !== activeFilter);
    });
  }

  // Grid cards
  const grid = document.getElementById('grid');
  photos.forEach((photo, i) => {
    const card = document.createElement('div');
    card.className = 'card loading';
    card.dataset.index    = i;
    card.dataset.category = photo.category;

    const img = document.createElement('img');
    img.alt     = photo.title;
    img.loading = 'lazy';
    img.onload  = () => card.classList.remove('loading');
    img.onerror = () => { card.classList.remove('loading'); card.style.minHeight = '80px'; };
    img.src = photo.src;

    const overlay = document.createElement('div');
    overlay.className = 'card-overlay';
    overlay.innerHTML = `<div class="card-label">${photo.title}<small>${photo.category}</small></div>`;

    card.append(img, overlay);
    card.addEventListener('click', () => openLightbox(i));
    grid.appendChild(card);
  });

  // Lightbox
  const lb    = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-caption');
  let cur = 0;

  function getVisible() {
    return photos.map((p, i) => ({ ...p, i })).filter(p => activeFilter === 'All' || p.category === activeFilter);
  }

  function openLightbox(photoIdx) {
    const vis = getVisible();
    const pos = vis.findIndex(p => p.i === photoIdx);
    if (pos === -1) return;
    cur = pos;
    show(vis[pos]);
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function show(photo) {
    lbImg.src = photo.src;
    lbImg.alt = photo.title;
    lbCap.textContent = photo.title + ' — ' + photo.category;
  }

  function navigate(dir) {
    const vis = getVisible();
    cur = (cur + dir + vis.length) % vis.length;
    show(vis[cur]);
  }

  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('lb-next').addEventListener('click', () => navigate(1));
  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     close();
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }
}

// ── Load photos.json
fetch(PHOTOS_DIR + 'photos.json')
  .then(r => {
    if (!r.ok) throw new Error('not found');
    return r.json();
  })
  .then(data => {
    if (!Array.isArray(data) || data.length === 0) throw new Error('empty');
    buildGallery(data);
  })
  .catch(() => {
    document.getElementById('grid').classList.add('hidden');
    const err = document.getElementById('error-msg');
    err.classList.remove('hidden');
    err.innerHTML = `
      <p><strong>No photos found.</strong> To add your photos:</p>
      <ol style="margin-top:1rem; padding-left:1.4rem; line-height:2.2;">
        <li>Put your image files in the <code>photos/</code> folder on GitHub</li>
        <li>Name them like: <code>landscape-alpine-morning.jpg</code> (category first, then title words, separated by hyphens)</li>
        <li>Create a file called <code>photos/photos.json</code> containing a list of your filenames:<br>
          <code>["landscape-alpine-morning.jpg", "portrait-golden-hour.jpg"]</code>
        </li>
        <li>Commit — your gallery will appear automatically</li>
      </ol>
    `;
  });
</script>
</body>
</html>
